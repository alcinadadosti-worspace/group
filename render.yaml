# Render Blueprint - FeedSyncs
# Banco de dados: Supabase (externo)

services:
  # Web Service - Next.js Application
  - type: web
    name: feedsyncs
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false  # Configurar manualmente com URL do Supabase
      - key: DIRECT_URL
        sync: false  # URL direta do Supabase (para migrations)
      - key: JWT_SECRET
        generateValue: true
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_ADMIN_CHANNEL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
