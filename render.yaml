# Render Blueprint - FeedSyncs
# Documentação: https://render.com/docs/blueprint-spec

services:
  # Web Service - Next.js Application
  - type: web
    name: feedsyncs
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: feedsyncs-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_ADMIN_CHANNEL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false

databases:
  # PostgreSQL Database
  - name: feedsyncs-db
    databaseName: feedsyncs
    user: feedsyncs_user
    plan: free
    region: oregon
